<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Name | 导航页</title>
    <meta
      name="description"
      content="One-line bio - Your Name 的个人导航页面"
    />

    <!-- OpenGraph / Twitter Cards for SEO & social sharing -->
    <meta property="og:title" content="Your Name | 导航页" />
    <meta
      property="og:description"
      content="One-line bio - Your Name 的个人导航页面"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:image" content="https://example.com/avatar.png" />
    <!-- 替换为主域名的真实图片地址 -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Favicon (placeholder) -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- 动态渐变背景 -->
    <div class="bg-gradient"></div>

    <div class="container">
      <!-- 头部信息 -->
      <header class="profile">
        <button
          id="theme-toggle"
          class="theme-btn"
          aria-label="Toggle Dark Mode"
        >
          <svg
            id="moon-icon"
            class="theme-icon"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg
            id="sun-icon"
            class="theme-icon hidden"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>

        <!-- 头像可以替换成自己的 URL，例如 https://github.com/yourname.png -->
        <img
          src="https://github.com/fluidicon.png"
          alt="Avatar"
          class="avatar"
          id="profile-avatar"
        />

        <h1 class="name" id="profile-name">&lt;Your Name&gt;</h1>
        <p class="bio" id="profile-bio">&lt;One-line bio&gt;</p>

        <div class="tags">
          <span class="tag">写作</span>
          <span class="tag">代码</span>
          <span class="tag">摄影</span>
        </div>
      </header>

      <!-- 链接卡片区 -->
      <main class="links-container" id="links-container">
        <!-- 链接通过 JS 动态渲染 -->
      </main>

      <!-- 底部版权和时间 -->
      <footer class="footer">
        <p>
          &copy; <span id="current-year"></span> Your Name. All rights reserved.
        </p>
        <p class="last-updated">
          最后更新: <span id="last-updated-date"></span>
        </p>
      </footer>
    </div>

    <script src="main.js"></script>
  </body>
</html>
