<!doctype html>
<html lang="zh" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page</title>

    <!-- SEO & OpenGraph base (will be dynamically updated by JS if config is loaded) -->
    <meta name="description" id="meta-desc" content="Personal Landing Page" />
    <meta property="og:title" id="og-title" content="Landing Page" />
    <meta
      property="og:description"
      id="og-desc"
      content="Personal Landing Page"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/og.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Favicons -->
    <link rel="icon" href="assets/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Onest:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- 氛围背景层 -->
    <div class="ambient-bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
      <div class="mesh-overlay"></div>
    </div>

    <!-- 顶部控制面板（主题 + 语言切换） -->
    <div class="top-controls">
      <button
        id="lang-toggle"
        class="icon-btn"
        aria-label="Toggle Language"
        title="切换语言"
      >
        中文
      </button>
      <button
        id="theme-toggle"
        class="icon-btn"
        aria-label="Toggle Theme"
        title="切换主题"
      >
        <svg
          id="theme-icon-sun"
          class="icon hidden"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
        <svg
          id="theme-icon-moon"
          class="icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>
    </div>

    <!-- 加载与错误提示 -->
    <div id="loading" class="loading">Loading...</div>
    <div id="error-message" class="error-message hidden"></div>

    <!-- 主体区域 -->
    <main class="container hidden" id="app">
      <!-- 头部信息 -->
      <header class="profile">
        <img id="avatar" src="assets/avatar.png" alt="Avatar" class="avatar" />
        <h1 id="name" class="name"></h1>
        <p id="bio" class="bio"></p>
      </header>
      <!-- 状态栏 -->
      <div class="status-bar" id="status-bar" style="display: none">
        <span id="status-text"></span>
      </div>
      <!-- 摄影集展示区 -->
      <div id="portfolio-section" class="portfolio-section hidden">
        <h2 id="portfolio-title" class="section-title"></h2>
        <div id="portfolio-grid" class="portfolio-grid"></div>
      </div>

      <!-- 链接分组区 -->
      <div id="sections" class="sections"></div>
    </main>

    <!-- Footer -->
    <footer class="footer hidden" id="footer">
      <p>
        &copy; <span id="year"></span> <span id="footer-name"></span>. All
        rights reserved.
      </p>
    </footer>

    <!-- Toast 提示框 -->
    <div
      id="toast"
      class="toast hidden"
      role="alert"
      aria-live="assertive"
    ></div>

    <!-- Modal 模态框（用于显示二维码或画廊） -->
    <div
      id="modal"
      class="modal hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-caption"
    >
      <div class="modal-overlay" id="modal-overlay"></div>
      <div class="modal-content">
        <button id="modal-close" class="modal-close" aria-label="Close Modal">
          ×
        </button>
        <button
          id="modal-prev"
          class="modal-nav prev hidden"
          aria-label="Previous Image"
        >
          <svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <img id="modal-img" src="" alt="Modal Image" class="modal-img" />
        <button
          id="modal-next"
          class="modal-nav next hidden"
          aria-label="Next Image"
        >
          <svg
            viewBox="0 0 24 24"
            width="24"
            height="24"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
        <p id="modal-caption" class="modal-caption"></p>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
